name: Build Natives

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  PREMAKE_VERSION: 5.0.0-beta8
  STEAMWORKS_SDK_REPO: Anuken/SteamSdkPrivate
  STEAMWORKS_SDK_TAG: sdk
  STEAMWORKS_SDK_ASSET: steamworks_sdk_164.zip

jobs:

  # ---------------------------------------------------------------------
  # Linux x64
  # ---------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            ca-certificates \
            unzip \
            jq \
            git

      - name: Install premake5
        run: |
          curl -L -o premake5.tar.gz "https://github.com/premake/premake-core/releases/download/v${{ env.PREMAKE_VERSION }}/premake-${{ env.PREMAKE_VERSION }}-linux.tar.gz"
          tar -xzf premake5.tar.gz
          mv premake5 /usr/local/bin/premake5
          chmod +x /usr/local/bin/premake5

      - name: Download Steamworks SDK
        env:
          SDK_REPO_PAT: ${{ secrets.SDK_REPO_PAT }}
        run: |
          ASSET_ID=$(curl -sSL \
            -H "Authorization: token ${SDK_REPO_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ env.STEAMWORKS_SDK_REPO }}/releases/tags/${{ env.STEAMWORKS_SDK_TAG }}" \
            | jq -r --arg name "${{ env.STEAMWORKS_SDK_ASSET }}" '.assets[] | select(.name == $name) | .id')

          if [ -z "$ASSET_ID" ] || [ "$ASSET_ID" = "null" ]; then
            echo "::error::Could not find asset '${{ env.STEAMWORKS_SDK_ASSET }}' in release '${{ env.STEAMWORKS_SDK_TAG }}' of ${{ env.STEAMWORKS_SDK_REPO }}"
            exit 1
          fi

          curl -sSL \
            -H "Authorization: token ${SDK_REPO_PAT}" \
            -H "Accept: application/octet-stream" \
            -o sdk.zip \
            "https://api.github.com/repos/${{ env.STEAMWORKS_SDK_REPO }}/releases/assets/${ASSET_ID}"

          unzip -q sdk.zip -d .
          # This assumes the zip's top-level entry is "sdk/" (Valve's default layout),
          # so it lands at repo root as ./sdk. Adjust here if your archive differs.
          test -d sdk

      - name: Build natives
        working-directory: build-natives
        run: |
          chmod +x build-linux.sh
          ./build-linux.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux64-natives
          path: |
            src/main/resources/libsteamworks4j.so
            server/src/main/resources/libsteamworks4j-server.so
            server/src/main/resources/libsteamworks4j-encryptedappticket.so

  # ---------------------------------------------------------------------
  # Windows x64
  # ---------------------------------------------------------------------
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install premake5
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/premake/premake-core/releases/download/v${{ env.PREMAKE_VERSION }}/premake-${{ env.PREMAKE_VERSION }}-windows.zip" -OutFile premake5.zip
          Expand-Archive premake5.zip -DestinationPath premake5-bin
          echo "$PWD\premake5-bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Download Steamworks SDK
        shell: pwsh
        env:
          SDK_REPO_PAT: ${{ secrets.SDK_REPO_PAT }}
        run: |
          $jsonHeaders = @{
            Authorization = "token $env:SDK_REPO_PAT"
            Accept        = "application/vnd.github+json"
          }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ env.STEAMWORKS_SDK_REPO }}/releases/tags/${{ env.STEAMWORKS_SDK_TAG }}" -Headers $jsonHeaders
          $asset = $release.assets | Where-Object { $_.name -eq "${{ env.STEAMWORKS_SDK_ASSET }}" }

          if (-not $asset) {
            Write-Error "Could not find asset '${{ env.STEAMWORKS_SDK_ASSET }}' in release '${{ env.STEAMWORKS_SDK_TAG }}' of ${{ env.STEAMWORKS_SDK_REPO }}"
            exit 1
          }

          $binHeaders = @{
            Authorization = "token $env:SDK_REPO_PAT"
            Accept        = "application/octet-stream"
          }
          Invoke-WebRequest -Uri $asset.url -Headers $binHeaders -OutFile sdk.zip

          Expand-Archive sdk.zip -DestinationPath .
          # Assumes the zip's top-level entry is "sdk/", landing at repo root as .\sdk

      - name: Build natives
        working-directory: build-natives
        shell: cmd
        run: build-win.bat vs2022

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win64-natives
          path: |
            src/main/resources/steamworks4j64.dll
            server/src/main/resources/steamworks4j-server64.dll
            server/src/main/resources/steamworks4j-encryptedappticket64.dll

  # ---------------------------------------------------------------------
  # macOS - universal (x86_64 + arm64) via lipo, matching build-osx.sh
  # ---------------------------------------------------------------------
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install premake5
        run: |
          curl -L -o premake5.tar.gz "https://github.com/premake/premake-core/releases/download/v${{ env.PREMAKE_VERSION }}/premake-${{ env.PREMAKE_VERSION }}-macosx.tar.gz"
          mkdir -p build-natives
          tar -xzf premake5.tar.gz -C build-natives
          chmod +x build-natives/premake5

      - name: Download Steamworks SDK
        env:
          SDK_REPO_PAT: ${{ secrets.SDK_REPO_PAT }}
        run: |
          ASSET_ID=$(curl -sSL \
            -H "Authorization: token ${SDK_REPO_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ env.STEAMWORKS_SDK_REPO }}/releases/tags/${{ env.STEAMWORKS_SDK_TAG }}" \
            | jq -r --arg name "${{ env.STEAMWORKS_SDK_ASSET }}" '.assets[] | select(.name == $name) | .id')

          if [ -z "$ASSET_ID" ] || [ "$ASSET_ID" = "null" ]; then
            echo "::error::Could not find asset '${{ env.STEAMWORKS_SDK_ASSET }}' in release '${{ env.STEAMWORKS_SDK_TAG }}' of ${{ env.STEAMWORKS_SDK_REPO }}"
            exit 1
          fi

          curl -sSL \
            -H "Authorization: token ${SDK_REPO_PAT}" \
            -H "Accept: application/octet-stream" \
            -o sdk.zip \
            "https://api.github.com/repos/${{ env.STEAMWORKS_SDK_REPO }}/releases/assets/${ASSET_ID}"

          unzip -q sdk.zip -d .
          test -d sdk

      - name: Build natives
        working-directory: build-natives
        run: |
          chmod +x build-osx.sh
          ./build-osx.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos64-natives
          path: |
            src/main/resources/libsteamworks4j.dylib
            server/src/main/resources/libsteamworks4j-server.dylib
            server/src/main/resources/libsteamworks4j-encryptedappticket.dylib
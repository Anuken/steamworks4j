name: Build Natives

on: [workflow_dispatch]

jobs:
  natives-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Build Linux Natives in Docker Container
        uses: ./.github/workflows/build-linux-natives
        id: docker

      - name: Upload natives
        uses: actions/upload-artifact@v7
        with:
          name: Linux natives
          path: |
            build/natives

  natives-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
      - name: Install dependencies
        run: sudo apt install g++-mingw-w64 g++-mingw-w64-x86-64 gcc-mingw-w64 gcc-mingw-w64-i686 gcc-mingw-w64-x86-64
      - name: Build natives
        run: |
          ./gradlew jnigenBuildAllWindows
      - name: Upload natives
        uses: actions/upload-artifact@v7
        with:
          name: Windows natives
          path: |
            build/natives
  natives-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
      - name: Build natives
        env:
          MACOSX_DEPLOYMENT_TARGET: '10.9'
        run: |
          ./gradlew jnigenBuildAllMacOsX
      - name: Upload natives
        uses: actions/upload-artifact@v7
        with:
          name: MacOS natives
          path: |
            build/natives
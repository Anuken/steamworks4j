name: Build Natives

on: [workflow_dispatch]

jobs:
  natives-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Build Linux Natives in Docker Container
        uses: ./.github/workflows/build-linux-natives
        id: docker

      - name: Upload natives
        uses: actions/upload-artifact@v7
        with:
          name: Linux natives
          path: |
            build/natives

  natives-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Build natives
        shell: cmd
        run: gradlew.bat jnigenBuildAllWindows --no-daemon
      - name: Upload natives
        uses: actions/upload-artifact@v7
        with:
          name: Windows natives
          path: |
            build/natives
  natives-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
      - name: Build natives
        env:
          MACOSX_DEPLOYMENT_TARGET: '10.9'
        run: |
          ./gradlew jnigenBuildAllMacOsX --no-daemon
          lipo -create build/natives/macosx64/libfrogworks64.dylib build/natives/macosxarm64/libfrogworksarm64.dylib -output build/natives/libfrogworks64.dylib
      - name: Upload natives
        uses: actions/upload-artifact@v7
        with:
          name: MacOS natives
          path: |
            build/natives